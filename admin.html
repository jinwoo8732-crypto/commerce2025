<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>관리자 페이지</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;padding:30px;background:#f4f6fa;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
select{padding:5px;}
</style>
</head>
<body>

<h2>📋 견적 관리</h2>

<table>
<thead>
<tr>
<th>주문번호</th>
<th>고객명</th>
<th>연락처</th>
<th>금액</th>
<th>상태</th>
<th>변경</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

<script>
const supabase = window.supabase.createClient(
  "YOUR_URL",
  "YOUR_ANON_KEY"
);

async function load(){
  const { data } = await supabase.from("quotes").select("*").order("created_at",{ascending:false});
  const tbody=document.getElementById("list");
  tbody.innerHTML="";
  data.forEach(row=>{
    tbody.innerHTML+=`
      <tr>
      <td>${row.order_no}</td>
      <td>${row.name}</td>
      <td>${row.phone}</td>
      <td>${row.total}</td>
      <td>${row.status}</td>
      <td>
        <select onchange="updateStatus('${row.order_no}','${row.email}',this.value)">
          <option>접수</option>
          <option>검토중</option>
          <option>견적완료</option>
          <option>발송완료</option>
        </select>
      </td>
      </tr>
    `;
  });
}

async function updateStatus(orderNo,email,status){
  await supabase.from("quotes").update({status}).eq("order_no",orderNo);

  await fetch("/api/update",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,orderNo,status})
  });

  alert("상태 변경 완료");
  load();
}

load();
</script>

</body>
</html>
