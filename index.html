<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>프로파일 자동견적기</title>

<style>
body{font-family:Arial;background:#f2f4f8;padding:40px;}
.container{max-width:1200px;margin:auto;background:#fff;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.08);}
h2{margin-bottom:20px;}
.step{margin-top:40px;font-weight:bold;font-size:18px;}
.size-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:15px;}
.size-btn{padding:15px;border:none;border-radius:10px;background:#eef1f6;cursor:pointer;font-size:16px;}
.size-btn.active{background:#2c3e70;color:#fff;}
.flex-box{display:flex;gap:40px;margin-top:20px;}
.left-img img{max-width:100%;}
.input-row{display:flex;align-items:center;margin-bottom:15px;}
.input-row label{width:80px;}
.input-row input,.input-row select{flex:1;padding:8px;border-radius:8px;border:1px solid #ccc;}
.price-box{font-size:20px;color:#e74c3c;font-weight:bold;}
.option-row{margin-top:10px;}
.cart{margin-top:40px;}
.cart table{width:100%;border-collapse:collapse;}
.cart th,.cart td{border:1px solid #ddd;padding:8px;text-align:center;}
.cart th{background:#f0f0f0;}
.total{font-size:18px;font-weight:bold;text-align:right;margin-top:15px;}
button{padding:8px 15px;border:none;border-radius:8px;cursor:pointer;}
.primary{background:#2c3e70;color:#fff;}
.danger{background:#e74c3c;color:#fff;}
.admin-btn{position:fixed;bottom:20px;right:20px;background:#111;color:#fff;}
</style>
</head>

<body>
<div class="container">

<h2>1. 규격 선택</h2>
<div class="size-grid" id="sizeGrid"></div>

<div class="step">2. 길이 및 수량</div>
<div class="flex-box">
<div class="left-img">
<img id="previewImage">
</div>

<div style="flex:1;">
<div class="input-row">
<label>색상</label>
<select id="color">
<option value="silver">실버</option>
<option value="black">블랙</option>
</select>
</div>

<div class="input-row">
<label>길이</label>
<input type="number" id="length" value="100" min="50">
<span style="margin-left:10px;">mm</span>
</div>

<div class="input-row">
<label>수량</label>
<input type="number" id="qty" value="1" min="1">
</div>

<div class="input-row">
<label>금액</label>
<div class="price-box" id="price">0 원</div>
</div>

</div>
</div>

<div class="step">3. 가공 옵션</div>

<div class="option-row">
탭가공 <input type="number" id="tapQty" value="0" min="0" style="width:70px;">
홀가공 <input type="number" id="holeQty" value="0" min="0" style="width:70px;">
카운터보어 <input type="number" id="counterQty" value="0" min="0" style="width:70px;">
</div>

<br>
<button class="primary" onclick="addToCart()">제품담기</button>

<div class="cart">
<h3>장바구니</h3>
<table>
<thead>
<tr>
<th>규격</th><th>색상</th><th>길이</th><th>수량</th><th>가공</th><th>금액</th><th>삭제</th>
</tr>
</thead>
<tbody id="cartBody"></tbody>
</table>

<div class="total">총 합계: <span id="grandTotal">0</span> 원</div>

<button class="danger" onclick="clearCart()">전체삭제</button>
</div>

</div>

<button class="admin-btn" onclick="adminLogin()">관리자</button>

<script>

// 기본 단가 (M 기준)
const defaultPrices={
2020:{silver:3900,black:6000},
2040:{silver:6900,black:9000},
3030:{silver:8900,black:11000},
3060:{silver:14000,black:18000},
4040:{silver:16000,black:19000},
4080:{silver:28000,black:30000}
};

let prices=JSON.parse(localStorage.getItem("profilePrices"))||defaultPrices;

let selectedSize="2020";

const sizeGrid=document.getElementById("sizeGrid");

Object.keys(prices).forEach(size=>{
const btn=document.createElement("button");
btn.textContent=size;
btn.className="size-btn";
btn.onclick=function(){
document.querySelectorAll(".size-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
selectedSize=size;
updatePrice();
};
sizeGrid.appendChild(btn);
});

document.querySelector(".size-btn").classList.add("active");

function updatePrice(){

let color=document.getElementById("color").value;
let length=parseInt(document.getElementById("length").value)||0;
let qty=parseInt(document.getElementById("qty").value)||0;

if(length<50){length=50;}

let unit100=Math.ceil(length/100); // 🔥 100mm 단위 올림
let base100=(prices[selectedSize][color]/10); // M단가 → 100mm단가
let base=unit100*base100;

let total=base*qty;

total+=300*(parseInt(document.getElementById("tapQty").value)||0);
total+=400*(parseInt(document.getElementById("holeQty").value)||0);
total+=1000*(parseInt(document.getElementById("counterQty").value)||0);

document.getElementById("price").textContent=total.toLocaleString()+" 원";
document.getElementById("previewImage").src="images/"+selectedSize+"_"+color+".png";
}

document.addEventListener("input",updatePrice);
updatePrice();

function addToCart(){
const row=document.createElement("tr");
row.innerHTML=`
<td>${selectedSize}</td>
<td>${color.value}</td>
<td>${length.value}mm</td>
<td>${qty.value}</td>
<td>탭:${tapQty.value} 홀:${holeQty.value} 카운터:${counterQty.value}</td>
<td>${price.textContent}</td>
<td><button onclick="this.closest('tr').remove();updateGrand();">X</button></td>
`;
cartBody.appendChild(row);
updateGrand();
}

function updateGrand(){
let g=0;
document.querySelectorAll("#cartBody tr").forEach(r=>{
g+=parseInt(r.children[5].textContent.replace(/,/g,''))||0;
});
grandTotal.textContent=g.toLocaleString();
}

function clearCart(){
cartBody.innerHTML="";
updateGrand();
}
// ==========================
// 🔐 관리자 단가 수정 시스템
// ==========================

function adminLogin(){
  const pw = prompt("관리자 비밀번호 입력");
  if(pw === "bandotec123"){
    openAdminPanel();
  }else{
    alert("비밀번호가 틀렸습니다.");
  }
}

function openAdminPanel(){

  const panel = document.createElement("div");
  panel.id = "adminPanel";
  panel.style.position = "fixed";
  panel.style.top = "50%";
  panel.style.left = "50%";
  panel.style.transform = "translate(-50%, -50%)";
  panel.style.background = "#fff";
  panel.style.padding = "25px";
  panel.style.borderRadius = "15px";
  panel.style.boxShadow = "0 10px 30px rgba(0,0,0,0.3)";
  panel.style.zIndex = "9999";
  panel.style.maxHeight = "80vh";
  panel.style.overflow = "auto";
  panel.style.width = "350px";

  let html = "<h3>단가 수정 (M 기준)</h3><br>";

  for(let size in prices){
    html += `<strong>${size}</strong><br>`;
    for(let color in prices[size]){
      html += `
        ${color} :
        <input type="number"
          data-size="${size}"
          data-color="${color}"
          value="${prices[size][color]}"
          style="width:100px;margin-bottom:5px;">
        원<br>
      `;
    }
    html += "<br>";
  }

  html += `
    <button onclick="savePrices()" style="margin-top:10px;">저장</button>
    <button onclick="resetPrices()">기본값 복원</button>
    <button onclick="closeAdmin()">닫기</button>
  `;

  panel.innerHTML = html;
  document.body.appendChild(panel);
}

function closeAdmin(){
  const panel = document.getElementById("adminPanel");
  if(panel) panel.remove();
}

function savePrices(){

  document.querySelectorAll("#adminPanel input").forEach(input=>{
    const size = input.dataset.size;
    const color = input.dataset.color;
    prices[size][color] = parseInt(input.value) || 0;
  });

  localStorage.setItem("profilePrices", JSON.stringify(prices));

  alert("단가가 저장되었습니다.");
  closeAdmin();
  updatePrice();
}

function resetPrices(){
  if(confirm("기본 단가로 복원하시겠습니까?")){
    prices = JSON.parse(JSON.stringify(defaultPrices));
    localStorage.setItem("profilePrices", JSON.stringify(prices));
    alert("복원 완료");
    closeAdmin();
    updatePrice();
  }
}

</script>
</body>
</html>
