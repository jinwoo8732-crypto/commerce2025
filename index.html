function addLine() {

  const line = document.createElement("div");
  line.className = "lineItem";
  line.style.marginBottom = "20px";
  line.style.padding = "15px";
  line.style.border = "1px solid #ddd";
  line.style.borderRadius = "10px";

  line.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:10px;align-items:center;margin-bottom:10px;">

      <select class="lineSize">
        <option value="2020">2020</option>
        <option value="2040">2040</option>
        <option value="3030">3030</option>
        <option value="3060">3060</option>
        <option value="4040">4040</option>
        <option value="4080">4080</option>
      </select>

      <select class="lineColor">
        <option value="silver">실버</option>
        <option value="black">블랙</option>
      </select>

      <input type="number" class="lineQty" value="1" min="1" placeholder="수량">

      <input type="number" class="lineLength" value="100" min="50" max="3000" placeholder="길이(mm)">

      <div class="lineTotal" style="font-weight:700;text-align:right;">
        0원
      </div>

    </div>

    <!-- 🔥 라인별 가공 옵션 -->
    <div style="display:flex;gap:15px;flex-wrap:wrap;margin-top:8px;align-items:center;">

      <label>
        <input type="checkbox" class="tapCheck"> 탭
      </label>
      <input type="number" class="tapQty" value="0" min="0" style="width:70px;">

      <label>
        <input type="checkbox" class="holeCheck"> 홀
      </label>
      <input type="number" class="holeQty" value="0" min="0" style="width:70px;">

      <label>
        <input type="checkbox" class="counterCheck"> 카운터보어
      </label>
      <input type="number" class="counterQty" value="0" min="0" style="width:70px;">

      <button onclick="this.closest('.lineItem').remove(); function calculateAllLines() {

  let grandTotal = 0;

  document.querySelectorAll(".lineItem").forEach(line => {

    const size = line.querySelector(".lineSize").value;
    const color = line.querySelector(".lineColor").value;
    const qty = parseInt(line.querySelector(".lineQty").value) || 0;
    const length = parseInt(line.querySelector(".lineLength").value) || 0;

    if (length < 50) {
      line.querySelector(".lineLength").value = 50;
      return;
    }

    if (length > 3000) {
      alert("3m 이상은 배송이 불가능합니다.");
      line.querySelector(".lineLength").value = 3000;
      return;
    }

    const baseUnit = prices[size][color];
    const meterPrice = (length / 1000) * baseUnit;
    const rounded = Math.round(meterPrice / 100) * 100;
    let lineTotal = rounded * qty;

    // 🔥 가공비 계산 (라인별)
    if (line.querySelector(".tapCheck").checked) {
      lineTotal += 300 * (parseInt(line.querySelector(".tapQty").value) || 0);
    }

    if (line.querySelector(".holeCheck").checked) {
      lineTotal += 400 * (parseInt(line.querySelector(".holeQty").value) || 0);
    }

    if (line.querySelector(".counterCheck").checked) {
      lineTotal += 1000 * (parseInt(line.querySelector(".counterQty").value) || 0);
    }

    // 🔥 라인별 금액 표시
    line.querySelector(".lineTotal").textContent =
      lineTotal.toLocaleString() + "원";

    grandTotal += lineTotal;
  });

  document.getElementById("grandTotal").textContent =
    grandTotal.toLocaleString();
}

    document.addEventListener("input", function(e) {

  if (
    e.target.classList.contains("lineSize") ||
    e.target.classList.contains("lineColor") ||
    e.target.classList.contains("lineQty") ||
    e.target.classList.contains("lineLength") ||
    e.target.classList.contains("tapQty") ||
    e.target.classList.contains("holeQty") ||
    e.target.classList.contains("counterQty") ||
    e.target.classList.contains("tapCheck") ||
    e.target.classList.contains("holeCheck") ||
    e.target.classList.contains("counterCheck")
  ) {
    calculateAllLines();
  }

});

      addLine();
calculateAllLines();
