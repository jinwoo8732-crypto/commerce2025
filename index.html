<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>관리자 견적 관리</title>

<style>
body{font-family:Arial;background:#f4f6f9;padding:30px;}
.container{max-width:1000px;margin:auto;background:#fff;padding:30px;border-radius:10px;}
.quote{border:1px solid #ddd;padding:15px;margin-bottom:15px;border-radius:8px;}
button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer;margin-right:5px;}
.danger{background:#e74c3c;color:#fff;}
.status{font-weight:bold;padding:3px 8px;border-radius:5px;}
.접수{background:#ffeaa7;}
.처리중{background:#74b9ff;color:#fff;}
.견적완료{background:#55efc4;}
</style>
</head>
<body>

<div class="container">
<h2>관리자 견적 관리 페이지</h2>
<div id="quoteList"></div>
<button class="danger" onclick="clearAll()">전체 삭제</button>
</div>

<script>

let pw = prompt("관리자 비밀번호 입력");
if(pw !== "bandotec123"){
  alert("접근 불가");
  document.body.innerHTML="";
}

let quoteList = JSON.parse(localStorage.getItem("quoteList")) || [];
let container = document.getElementById("quoteList");

function renderList(){
  container.innerHTML="";

  quoteList.forEach((q,index)=>{

    let div=document.createElement("div");
    div.className="quote";

    div.innerHTML=`
      <strong>접수일:</strong> ${q.date}<br>
      <strong>고객명:</strong> ${q.name}<br>
      <strong>연락처:</strong> ${q.phone}<br>
      <strong>이메일:</strong> ${q.email}<br>
      <strong>상태:</strong> <span class="status ${q.status}">${q.status}</span>
      <br><br>
      <pre>${q.details}</pre>
      <button onclick="changeStatus(${index},'접수')">접수</button>
      <button onclick="changeStatus(${index},'처리중')">처리중</button>
      <button onclick="changeStatus(${index},'견적완료')">견적완료</button>
      <button onclick="deleteQuote(${index})">삭제</button>
    `;

    container.appendChild(div);
  });
}

function changeStatus(i,status){
  quoteList[i].status=status;
  localStorage.setItem("quoteList", JSON.stringify(quoteList));
  renderList();
}

function deleteQuote(i){
  quoteList.splice(i,1);
  localStorage.setItem("quoteList", JSON.stringify(quoteList));
  renderList();
}

function clearAll(){
  if(confirm("전체 삭제하시겠습니까?")){
    localStorage.removeItem("quoteList");
    quoteList=[];
    renderList();
  }
}

renderList();

</script>
</body>
</html>
