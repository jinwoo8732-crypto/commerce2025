<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로파일커머스 자동견적</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  background:#f4f6fa;
  margin:0;
  padding:20px;
}
.container{
  max-width:1000px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}
h2{margin-top:30px;}

.size-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}
.size-btn{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#e8ecf4;
  cursor:pointer;
}
.size-btn.active{
  background:#2c3e70;
  color:#fff;
}

input,select{
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
  width:100%;
  box-sizing:border-box;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:6px;
  background:#2c3e70;
  color:#fff;
  cursor:pointer;
}

.cart table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}
.cart th,.cart td{
  border:1px solid #ddd;
  padding:6px;
  text-align:center;
  font-size:14px;
}
.cart th{background:#f0f2f7;}

.total{
  text-align:right;
  font-weight:bold;
  margin-top:10px;
  font-size:18px;
}

.success{
  color:green;
  font-weight:bold;
  margin-top:15px;
}

@media(max-width:600px){
  .cart table{font-size:12px;}
}
</style>
</head>

<body>

<div class="container">

<h2>1️⃣ 규격 선택</h2>
<div class="size-grid" id="sizeGrid"></div>

<h2>2️⃣ 길이 및 수량</h2>
<select id="color">
<option value="silver">실버</option>
<option value="black">블랙</option>
</select>

<input type="number" id="length" placeholder="길이(mm)" min="50">
<input type="number" id="qty" placeholder="수량" min="1">

<div id="price">0 원</div>

<h2>3️⃣ 가공 옵션</h2>
탭 <input type="number" id="tapQty" value="0" min="0">
홀 <input type="number" id="holeQty" value="0" min="0">
카운터 <input type="number" id="counterQty" value="0" min="0">

<br><br>
<button onclick="addToCart()">제품담기</button>

<div class="cart">
<h2>🛒 장바구니</h2>
<table>
<thead>
<tr>
<th>규격</th>
<th>색상</th>
<th>길이</th>
<th>수량</th>
<th>가공</th>
<th>금액</th>
<th>삭제</th>
</tr>
</thead>
<tbody id="cartBody"></tbody>
</table>

<div class="total">총 합계: <span id="grandTotal">0</span> 원</div>
</div>

<h2>4️⃣ 고객 정보</h2>
<input type="text" id="custName" placeholder="고객명">
<input type="text" id="custPhone" placeholder="연락처">
<input type="email" id="custEmail" placeholder="이메일">

<br><br>
<button onclick="submitQuote()">견적 요청</button>

<div id="resultMsg" class="success"></div>

</div>

<script>

// 🔐 Supabase 연결
const supabase = window.supabase.createClient(
const SUPABASE_URL = "https://gweeuszghkqmsjeiwjxo.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3ZWV1c3pnaGtxbXNqZWl3anhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MTYwODcsImV4cCI6MjA4NzQ5MjA4N30.yF2q-gCwfH3yjRpCAdbWNKHH-_7WT1ga7j6MBCvIQ68";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  
// 단가표
const prices={
2020:{silver:3900,black:6000},
2040:{silver:6900,black:9000},
3030:{silver:8900,black:11000},
3060:{silver:14000,black:18000},
4040:{silver:16000,black:19000},
4080:{silver:28000,black:30000}
};

let selectedSize="2020";

// 규격 버튼 생성
function createSizeButtons(){
const grid=document.getElementById("sizeGrid");
Object.keys(prices).forEach(size=>{
const btn=document.createElement("button");
btn.textContent=size;
btn.className="size-btn";
btn.onclick=function(){
document.querySelectorAll(".size-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
selectedSize=size;
updatePrice();
};
grid.appendChild(btn);
});
document.querySelector(".size-btn").classList.add("active");
}

// 계산 함수
function calculateLine(size,color,length,qty,tap,hole,counter){
if(length<50) length=50;
let unit100=Math.ceil(length/100);
let base100=prices[size][color]/10;
let total=unit100*base100*qty;
total+=300*tap;
total+=400*hole;
total+=1000*counter;
return {total,calculatedLength:unit100*100};
}

function updatePrice(){
let colorValue=document.getElementById("color").value;
let length=parseInt(document.getElementById("length").value)||0;
let qty=parseInt(document.getElementById("qty").value)||0;
let tap=parseInt(document.getElementById("tapQty").value)||0;
let hole=parseInt(document.getElementById("holeQty").value)||0;
let counter=parseInt(document.getElementById("counterQty").value)||0;

let result=calculateLine(selectedSize,colorValue,length,qty,tap,hole,counter);
document.getElementById("price").textContent=result.total.toLocaleString()+" 원";
}

document.addEventListener("input",updatePrice);

// 장바구니 추가
function addToCart(){
let colorValue=document.getElementById("color").value;
let length=parseInt(document.getElementById("length").value)||0;
let qty=parseInt(document.getElementById("qty").value)||0;
let tap=parseInt(document.getElementById("tapQty").value)||0;
let hole=parseInt(document.getElementById("holeQty").value)||0;
let counter=parseInt(document.getElementById("counterQty").value)||0;

let result=calculateLine(selectedSize,colorValue,length,qty,tap,hole,counter);

const row=document.createElement("tr");

row.innerHTML=`
<td>${selectedSize}</td>
<td>${colorValue}</td>
<td>${result.calculatedLength}</td>
<td>${qty}</td>
<td>탭:${tap} 홀:${hole} 카운터:${counter}</td>
<td class="linePrice">${result.total.toLocaleString()}</td>
<td><button onclick="this.closest('tr').remove();updateGrand();">X</button></td>
`;

document.getElementById("cartBody").appendChild(row);
updateGrand();
}

function updateGrand(){
let g=0;
document.querySelectorAll(".linePrice").forEach(cell=>{
g+=parseInt(cell.textContent.replace(/,/g,''))||0;
});
document.getElementById("grandTotal").textContent=g.toLocaleString();
}

// 제출
async function submitQuote(){

let name=document.getElementById("custName").value;
let phone=document.getElementById("custPhone").value;
let email=document.getElementById("custEmail").value;

if(!name||!phone||!email){alert("정보 입력하세요");return;}

let items="";
document.querySelectorAll("#cartBody tr").forEach(row=>{
items+=row.innerText+"\n";
});

let total=parseInt(document.getElementById("grandTotal").textContent.replace(/,/g,''))||0;
let orderNo="BD-"+Date.now();

// Supabase 저장
await supabase.from("quotes").insert([{
order_no:orderNo,name,phone,email,total,status:"접수"
}]);

// 관리자 메일
await fetch("/api/send-email",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,phone,email,items,total,orderNo})
});

// 고객 자동 회신
await fetch("/api/customer",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,email,items,total,orderNo})
});

document.getElementById("resultMsg").innerText="✅ 접수 완료! 주문번호: "+orderNo;

}

window.onload=function(){
createSizeButtons();
updatePrice();
}

</script>
</body>
</html>
