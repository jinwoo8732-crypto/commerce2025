<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>프로파일 자동견적기</title>

<style>
body{
  font-family: 'Pretendard', sans-serif;
  background:#f2f4f8;
  padding:40px;
}
.container{
  max-width:1200px;
  margin:auto;
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}
h2{
  margin-bottom:25px;
  font-size:22px;
}
.step-title{
  font-weight:600;
  margin:40px 0 15px;
  font-size:18px;
}
.size-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}
.size-btn{
  padding:15px;
  background:#f1f3f6;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}
.size-btn.active{
  background:#2c3e70;
  color:white;
}
.size-btn:hover{
  background:#dfe4ea;
}
.flex-box{
  display:flex;
  gap:40px;
  margin-top:20px;
}
.left-img{
  flex:1;
  text-align:center;
}
.left-img img{
  max-width:100%;
}
.right-form{
  flex:1;
}
.input-row{
  display:flex;
  align-items:center;
  margin-bottom:20px;
  justify-content:space-between;
}
.input-row label{
  width:100px;
}
.input-row input, .input-row select{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
.price-display{
  font-size:20px;
  font-weight:bold;
  color:#e74c3c;
}
.option-buttons{
  display:flex;
  gap:15px;
}
.option-btn{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#e9ecf2;
  cursor:pointer;
}
.option-btn.active{
  background:#2c3e70;
  color:white;
}
.primary-btn{
  background:#2c3e70;
  color:white;
  padding:12px 25px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:20px;
}
.primary-btn:hover{
  background:#1f2f54;
}
</style>
</head>

<body>
<div class="container">

<h2>1. 구매하실 프로파일의 규격을 선택해주세요.</h2>

<div class="size-grid" id="sizeGrid"></div>

<div class="step-title">2. 길이 및 수량 입력</div>

<div class="flex-box">

<div class="left-img">
<img id="previewImage" src="">
</div>

<div class="right-form">

<div class="input-row">
<label>색상</label>
<select id="colorSelect">
<option value="silver">실버</option>
<option value="black">블랙</option>
</select>
</div>

<div class="input-row">
<label>길이</label>
<input type="number" id="lengthInput" value="100" min="50" max="3000">
<span style="margin-left:10px;">mm</span>
</div>

<div class="input-row">
<label>수량</label>
<input type="number" id="qtyInput" value="1" min="1">
<span style="margin-left:10px;">EA</span>
</div>

<div class="input-row">
<label>금액</label>
<div class="price-display" id="priceDisplay">0 원</div>
</div>

</div>
</div>

<div class="step-title">2-1. 가공옵션 선택</div>

<div class="option-buttons">
<button class="option-btn" onclick="toggleOption(this,'tap')">탭가공</button>
<button class="option-btn" onclick="toggleOption(this,'hole')">홀가공</button>
<button class="option-btn" onclick="toggleOption(this,'counter')">카운터보어</button>
</div>

<button class="primary-btn" onclick="alert('장바구니 기능 유지 가능')">제품담기</button>

</div>

<script>

// 단가
const prices={
2020:{silver:3900,black:6000},
2040:{silver:6900,black:9000},
3030:{silver:8900,black:11000},
3060:{silver:14000,black:18000},
4040:{silver:16000,black:19000},
4080:{silver:28000,black:30000}
};

let selectedSize="2020";
let selectedOptions={tap:false,hole:false,counter:false};

// 규격 버튼 생성
const sizeGrid=document.getElementById("sizeGrid");
Object.keys(prices).forEach(size=>{
  const btn=document.createElement("button");
  btn.textContent=size;
  btn.className="size-btn";
  btn.onclick=function(){
    document.querySelectorAll(".size-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    selectedSize=size;
    updatePrice();
  };
  sizeGrid.appendChild(btn);
});

// 기본 선택
document.querySelector(".size-btn").classList.add("active");

function toggleOption(btn,type){
  btn.classList.toggle("active");
  selectedOptions[type]=btn.classList.contains("active");
  updatePrice();
}

function updatePrice(){
  const color=document.getElementById("colorSelect").value;
  let length=parseInt(document.getElementById("lengthInput").value)||0;
  let qty=parseInt(document.getElementById("qtyInput").value)||0;

  if(length<50){length=50;}
  if(length>3000){length=3000;}

  let base=(length/1000)*prices[selectedSize][color];
  let total=Math.round(base/100)*100*qty;

  if(selectedOptions.tap) total+=300;
  if(selectedOptions.hole) total+=400;
  if(selectedOptions.counter) total+=1000;

  document.getElementById("priceDisplay").textContent=total.toLocaleString()+" 원";

  document.getElementById("previewImage").src="images/"+selectedSize+"_"+color+".png";
}

document.addEventListener("input",updatePrice);
updatePrice();

</script>

</body>
</html>
