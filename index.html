<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로파일 자동견적기</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f2f4f8;margin:0;padding:40px;}
.container{max-width:1000px;margin:auto;background:#fff;padding:30px;border-radius:12px;}
button{padding:8px 12px;border:none;border-radius:6px;background:#2c3e70;color:#fff;cursor:pointer;}
input,select{padding:6px;margin:5px 0;}
</style>
</head>

<body>
<div class="container">

<h2>자동견적</h2>

<select id="size">
<option value="2020">2020</option>
<option value="2040">2040</option>
<option value="3030">3030</option>
<option value="3060">3060</option>
<option value="4040">4040</option>
<option value="4080">4080</option>
</select>

<select id="color">
<option value="silver">실버</option>
<option value="black">블랙</option>
</select>

<input type="number" id="length" placeholder="길이(mm)">
<input type="number" id="qty" placeholder="수량">

<br><br>

<input type="text" id="name" placeholder="고객명">
<input type="text" id="phone" placeholder="연락처">
<input type="email" id="email" placeholder="이메일">

<br><br>

<button onclick="submitQuote()">견적 요청</button>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://uujjbrytvrkhctfpknol.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1ampicnl0dnJraGN0ZnBrbm9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4OTQ4MTIsImV4cCI6MjA4NzQ3MDgxMn0.rf1NdA5puP0CG-TA5nI_fwk3KhMN5QmxXH3P3xOIToo"
);

async function generateOrderNo(){
  const today = new Date();
  const y = today.getFullYear();
  const m = String(today.getMonth()+1).padStart(2,'0');
  const d = String(today.getDate()).padStart(2,'0');

  const { data } = await supabase
    .from("quotes")
    .select("id", { count: 'exact' });

  const count = data.length + 1;

  return `BD-${y}${m}${d}-${String(count).padStart(4,'0')}`;
}

async function submitQuote(){

  const size = document.getElementById("size").value;
  const color = document.getElementById("color").value;
  const length = document.getElementById("length").value;
  const qty = document.getElementById("qty").value;

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;

  if(!name || !phone){
    alert("고객명과 연락처 입력");
    return;
  }

  const orderNo = await generateOrderNo();

  const items = `${size} / ${color} / ${length}mm / ${qty}개`;

  const { error } = await supabase
    .from("quotes")
    .insert([
      {
        order_no: orderNo,
        name: name,
        phone: phone,
        email: email,
        items: items,
        total: 0,
        status: "접수"
      }
    ]);

  if(error){
    alert("DB 저장 실패");
    console.log(error);
  } else {
    alert("견적 접수 완료\n주문번호: " + orderNo);
  }
}

</script>

</body>
</html>
