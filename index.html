<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로파일 자동견적</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f2f4f8;margin:0;padding:40px;}
.container{max-width:1100px;margin:auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
h2{margin-top:30px;}
.size-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.size-btn{padding:10px;border:none;border-radius:6px;background:#e9ecf2;cursor:pointer;}
.size-btn.active{background:#2c3e70;color:#fff;}
input,select{padding:6px;margin:5px 0;border-radius:6px;border:1px solid #ccc;}
button{padding:8px 12px;border:none;border-radius:6px;background:#2c3e70;color:#fff;cursor:pointer;}
.cart table{width:100%;border-collapse:collapse;margin-top:20px;}
.cart th,.cart td{border:1px solid #ddd;padding:6px;text-align:center;}
.cart th{background:#f0f0f0;}
.total{text-align:right;font-weight:bold;margin-top:10px;}
</style>
</head>

<body>

<div class="container">

<h2>1. 규격 선택</h2>
<div class="size-grid" id="sizeGrid"></div>

<h2>2. 길이 및 수량</h2>
<select id="color">
<option value="silver">실버</option>
<option value="black">블랙</option>
</select>
<input type="number" id="length" placeholder="길이(mm)" min="50">
<input type="number" id="qty" placeholder="수량" min="1">
<div id="price">0 원</div>

<h2>3. 가공 옵션</h2>
탭 <input type="number" id="tapQty" value="0" min="0" style="width:60px;">
홀 <input type="number" id="holeQty" value="0" min="0" style="width:60px;">
카운터 <input type="number" id="counterQty" value="0" min="0" style="width:60px;">
<br><br>
<button onclick="addToCart()">제품담기</button>

<div class="cart">
<h2>장바구니</h2>
<table>
<thead>
<tr>
<th>규격</th><th>색상</th><th>길이</th><th>수량</th>
<th>탭</th><th>홀</th><th>카운터</th>
<th>금액</th><th>삭제</th>
</tr>
</thead>
<tbody id="cartBody"></tbody>
</table>
<div class="total">총 합계: <span id="grandTotal">0</span> 원</div>
</div>

<h2>4. 고객 정보</h2>
<input type="text" id="custName" placeholder="고객명">
<input type="text" id="custPhone" placeholder="연락처">
<input type="email" id="custEmail" placeholder="이메일">
<br><br>
<button onclick="submitQuote()">견적 요청</button>

</div>

<script>

// 🔹 Supabase 연결
const supabase = window.supabase.createClient(
  "https://uujjbrytvrkhctfpknol.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1ampicnl0dnJraGN0ZnBrbm9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4OTQ4MTIsImV4cCI6MjA4NzQ3MDgxMn0.rf1NdA5puP0CG-TA5nI_fwk3KhMN5QmxXH3P3xOIToo"
);

// 🔹 단가표
const prices={
2020:{silver:3900,black:6000},
2040:{silver:6900,black:9000},
3030:{silver:8900,black:11000},
3060:{silver:14000,black:18000},
4040:{silver:16000,black:19000},
4080:{silver:28000,black:30000}
};

let selectedSize="2020";

function createSizeButtons(){
const grid=document.getElementById("sizeGrid");
Object.keys(prices).forEach(size=>{
const btn=document.createElement("button");
btn.textContent=size;
btn.className="size-btn";
btn.onclick=function(){
document.querySelectorAll(".size-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
selectedSize=size;
updatePrice();
};
grid.appendChild(btn);
});
document.querySelector(".size-btn").classList.add("active");
}

function calculateLine(size,color,length,qty,tap,hole,counter){
if(length<50) length=50;
let unit100=Math.ceil(length/100);
let base100=prices[size][color]/10;
let total=unit100*base100*qty;
total+=300*tap;
total+=400*hole;
total+=1000*counter;
return {total,calculatedLength:unit100*100};
}

function updatePrice(){
let color=document.getElementById("color").value;
let length=parseInt(document.getElementById("length").value)||0;
let qty=parseInt(document.getElementById("qty").value)||0;
let tap=parseInt(tapQty.value)||0;
let hole=parseInt(holeQty.value)||0;
let counter=parseInt(counterQty.value)||0;

let result=calculateLine(selectedSize,color,length,qty,tap,hole,counter);
price.textContent=result.total.toLocaleString()+" 원";
}

document.addEventListener("input",updatePrice);

function addToCart(){
let colorValue = document.getElementById("color").value;
let length=parseInt(document.getElementById("length").value)||0;
let qty=parseInt(document.getElementById("qty").value)||0;
let tap=parseInt(tapQty.value)||0;
let hole=parseInt(holeQty.value)||0;
let counter=parseInt(counterQty.value)||0;

let result=calculateLine(selectedSize,color,length,qty,tap,hole,counter);

const row=document.createElement("tr");

row.innerHTML=`
<td>${selectedSize}</td>
<td>${color}</td>
<td>${result.calculatedLength}</td>
<td>${qty}</td>
<td>${tap}</td>
<td>${hole}</td>
<td>${counter}</td>
<td class="linePrice">${result.total.toLocaleString()}</td>
<td><button onclick="this.closest('tr').remove();updateGrand();">X</button></td>
`;

cartBody.appendChild(row);
updateGrand();
}

function updateGrand(){
let g=0;
document.querySelectorAll(".linePrice").forEach(cell=>{
g+=parseInt(cell.textContent.replace(/,/g,''))||0;
});
grandTotal.textContent=g.toLocaleString();
}

async function generateOrderNo(){
const { data } = await supabase.from("quotes").select("id");
return "BD-"+Date.now();
}

async function submitQuote(){

let name=custName.value;
let phone=custPhone.value;
let email=custEmail.value;

if(!name||!phone){alert("고객명/연락처 입력");return;}

let items=[];
document.querySelectorAll("#cartBody tr").forEach(row=>{
items.push(row.innerText);
});

let total=parseInt(grandTotal.textContent.replace(/,/g,''))||0;

let orderNo=await generateOrderNo();

const { error }=await supabase.from("quotes").insert([{
order_no:orderNo,
name:name,
phone:phone,
email:email,
items:items.join(" | "),
total:total,
status:"접수"
}]);

if(error){
alert("DB 저장 실패");
console.log(error);
}else{
alert("접수 완료\n주문번호: "+orderNo);
}

}

window.onload=function(){createSizeButtons();updatePrice();}

</script>

</body>
</html>
