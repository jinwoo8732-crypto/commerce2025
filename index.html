function addLine(){
  const div=document.createElement("div");
  div.className="lineItem";
  div.innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:10px;">
    <select class="size">
      ${Object.keys(prices).map(s=>`<option value="${s}">${s}</option>`).join("")}
    </select>

    <select class="color">
      <option value="silver">실버</option>
      <option value="black">블랙</option>
    </select>

    <!-- 🔥 길이 먼저 -->
    <input type="number" class="length" value="100" min="50" max="3000">

    <!-- 🔥 수량 뒤로 -->
    <input type="number" class="qty" value="1" min="1">

    <div class="lineTotal">0원</div>
  </div>

  <div style="margin-top:8px;">
    탭 <input type="number" class="tap" value="0" min="0" style="width:60px;">
    홀 <input type="number" class="hole" value="0" min="0" style="width:60px;">
    카운터보어 <input type="number" class="counter" value="0" min="0" style="width:60px;">
  </div>
  `;
  document.getElementById("productLines").appendChild(div);
}
